name: Assess repos (manual)

on:
  workflow_dispatch:
    inputs:
      from_file:
        description: 'Space-separated YAML files to assess (e.g. runner/orgs/konflux-ci.yaml). Leave blank to use --org.'
        default: 'runner/orgs/konflux-ci.yaml'
        required: false
      org:
        description: 'GitHub org — discovers ALL public repos. Overrides from_file if set.'
        required: false
      workers:
        description: 'Max concurrent workers'
        default: '5'
        required: false
      retries:
        description: 'Retry attempts per failed repo'
        default: '1'
        required: false

jobs:
  check-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Verify actor has write access to this repository
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Checking if ${{ github.actor }} has write access to ${{ github.repository }}..."
          permission=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('permission','none'))")
          echo "Permission level: ${permission}"
          if [[ "$permission" != "admin" && "$permission" != "write" ]]; then
            echo "::error::${{ github.actor }} does not have write access to ${{ github.repository }}. Access denied."
            exit 1
          fi
          echo "${{ github.actor }} has ${permission} access — authorized."

  assess:
    runs-on: ubuntu-latest
    needs: check-auth
    permissions:
      contents: write
    outputs:
      failed_count: ${{ steps.summary.outputs.failed_count }}
      failed_repos: ${{ steps.summary.outputs.failed_repos }}
      has_failures: ${{ steps.summary.outputs.has_failures }}

    steps:
      - name: Checkout central repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: runner/requirements.txt

      - name: Install dependencies
        run: pip install -r runner/requirements.txt

      - name: Configure git for pushing
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config credential.helper store
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials

      - name: Run assessments
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -n "${{ inputs.org }}" ]; then
            python3 runner/assess.py \
              --org "${{ inputs.org }}" \
              --workers "${{ inputs.workers }}" \
              --retries "${{ inputs.retries }}"
          else
            python3 runner/assess.py \
              --from-file ${{ inputs.from_file }} \
              --workers "${{ inputs.workers }}" \
              --retries "${{ inputs.retries }}"
          fi

      - name: Collect failure summary
        if: always()
        id: summary
        run: |
          files=$(ls runner/failed-*.yaml 2>/dev/null || true)
          if [ -n "$files" ]; then
            repos=$(python3 -c "
          import yaml, glob, sys
          repos = []
          for f in glob.glob('runner/failed-*.yaml'):
              data = yaml.safe_load(open(f))
              org = data.get('org', '?')
              for r in (data.get('repos') or []):
                  repos.append(f'{org}/{r}')
          print(', '.join(repos[:20]))
          if len(repos) > 20:
              print(f'... and {len(repos)-20} more', file=sys.stderr)
          ")
            count=$(python3 -c "
          import yaml, glob
          print(sum(len((yaml.safe_load(open(f)).get('repos') or [])) for f in glob.glob('runner/failed-*.yaml')))
          ")
            echo "has_failures=true" >> $GITHUB_OUTPUT
            echo "failed_count=$count" >> $GITHUB_OUTPUT
            echo "failed_repos=$repos" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
            echo "failed_count=0" >> $GITHUB_OUTPUT
            echo "failed_repos=" >> $GITHUB_OUTPUT
          fi

      - name: Commit failed repos YAML (if any)
        if: always()
        run: |
          files=$(ls runner/failed-*.yaml 2>/dev/null || true)
          if [ -n "$files" ]; then
            git add runner/failed-*.yaml
            git commit -m "chore: record failed repos from run ${{ github.run_id }}" || true
            git push || true
          fi

      - name: Upload failed repos artifact (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-repos
          path: runner/failed-*.yaml
          if-no-files-found: ignore

  notify:
    runs-on: ubuntu-latest
    needs: assess
    if: failure() && vars.SLACK_NOTIFICATIONS == 'true'
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *AgentReady assessment failed* — ${{ needs.assess.outputs.failed_count }} repo(s) failed",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Workflow", "value": "${{ github.workflow }}", "short": true },
                  { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                  { "title": "Failed repos", "value": "${{ needs.assess.outputs.failed_repos || 'unknown' }}", "short": false },
                  { "title": "Run summary", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false },
                  { "title": "Failed repos artifact", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts", "short": false }
                ]
              }]
            }
